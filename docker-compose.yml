services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: stats_bluenoser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed_sources.sql:/docker-entrypoint-initdb.d/02-seed-sources.sql
      - ./db/seed_topics.sql:/docker-entrypoint-initdb.d/03-seed-topics.sql

volumes:
  pgdata:
