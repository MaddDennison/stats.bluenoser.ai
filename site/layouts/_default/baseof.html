<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="/feed.xml">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-title">{{ .Site.Title }}</a>
      <p class="site-subtitle">Nova Scotia Economic Intelligence</p>
      <nav class="site-nav">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="container">
      {{ partial "ai-disclaimer.html" . }}
      <p>Data sourced under the <a href="https://open.canada.ca/en/open-government-licence-canada">Open Government Licence — Canada</a>.</p>
      <p>&copy; {{ now.Year }} Stats Bluenoser</p>
    </div>
  </footer>
</body>
</html>
